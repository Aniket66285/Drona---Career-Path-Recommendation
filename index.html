<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DRONA — Career Advisor</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Figtree:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:      #0c0e14;
    --surface: #13161f;
    --card:    #1a1e2a;
    --border:  #252a38;
    --accent:  #e8a020;
    --accent2: #f0c060;
    --green:   #3ecf8e;
    --red:     #f56565;
    --text:    #e8eaf0;
    --muted:   #7a8099;
    --font-display: 'Playfair Display', serif;
    --font-body:    'Figtree', sans-serif;
    --font-mono:    'JetBrains Mono', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 15px;
    min-height: 100vh;
    line-height: 1.6;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 900;
    color: var(--accent);
    letter-spacing: 2px;
  }
  .logo-sub {
    font-size: 12px;
    color: var(--muted);
    font-family: var(--font-mono);
    letter-spacing: 1px;
    text-transform: uppercase;
    border-left: 1px solid var(--border);
    padding-left: 16px;
    margin-left: 4px;
  }

  /* ── Main layout ── */
  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 32px 24px;
  }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 5px;
    margin-bottom: 28px;
  }
  .tab-btn {
    flex: 1;
    background: none;
    border: none;
    padding: 10px 16px;
    color: var(--muted);
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    border-radius: 7px;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }
  .tab-btn:hover { color: var(--text); background: var(--border); }
  .tab-btn.active {
    background: var(--accent);
    color: #0c0e14;
    font-weight: 600;
  }

  /* ── Panels ── */
  .panel { display: none; animation: fadeIn 0.25s ease; }
  .panel.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  /* ── Cards ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 20px;
  }
  .card-title {
    font-family: var(--font-display);
    font-size: 17px;
    color: var(--accent2);
    margin-bottom: 18px;
    font-weight: 700;
  }

  /* ── Form elements ── */
  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  input[type="text"], select, textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14px;
    padding: 10px 14px;
    border-radius: 8px;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus, select:focus, textarea:focus {
    border-color: var(--accent);
  }
  select option { background: var(--surface); }
  textarea { resize: vertical; min-height: 80px; }

  .form-row { margin-bottom: 16px; }
  .form-hint {
    font-size: 12px;
    color: var(--muted);
    margin-top: 5px;
    font-family: var(--font-mono);
  }

  /* ── Tag input ── */
  .tag-input-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    cursor: text;
    min-height: 46px;
    transition: border-color 0.2s;
  }
  .tag-input-wrap:focus-within { border-color: var(--accent); }
  .tag {
    background: var(--accent);
    color: #0c0e14;
    font-size: 12px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    display: flex;
    align-items: center;
    gap: 5px;
    font-family: var(--font-mono);
  }
  .tag-remove {
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    color: #0c0e14;
    opacity: 0.7;
  }
  .tag-remove:hover { opacity: 1; }
  .tag-input {
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14px;
    flex: 1;
    min-width: 120px;
    padding: 2px 4px;
  }

  /* ── Buttons ── */
  .btn {
    background: var(--accent);
    color: #0c0e14;
    border: none;
    padding: 12px 28px;
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 700;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .btn:hover { background: var(--accent2); transform: translateY(-1px); }
  .btn:active { transform: none; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 8px 16px;
    font-size: 13px;
  }
  .btn-ghost:hover { background: var(--border); color: var(--text); }

  /* ── Results ── */
  .results { margin-top: 24px; }
  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 14px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .result-card:hover { border-color: var(--accent); }
  .result-card.rank-1 { border-left: 3px solid var(--accent); }
  .result-card.rank-2 { border-left: 3px solid var(--muted); }
  .result-card.rank-3 { border-left: 3px solid #5a6080; }

  .result-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 12px;
  }
  .result-name {
    font-family: var(--font-display);
    font-size: 19px;
    font-weight: 700;
    color: var(--text);
  }
  .result-rank {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
    background: var(--border);
    padding: 3px 10px;
    border-radius: 20px;
  }
  .result-category {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 10px;
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .result-desc {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 14px;
    line-height: 1.5;
  }

  /* Progress bar */
  .progress-wrap { margin-bottom: 14px; }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    margin-bottom: 5px;
  }
  .progress-label span:first-child { color: var(--muted); }
  .progress-label span:last-child {
    font-family: var(--font-mono);
    font-weight: 600;
    color: var(--accent);
  }
  .progress-bar {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 3px;
    transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* Grade badge */
  .grade {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    font-family: var(--font-mono);
    padding: 2px 10px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .grade-Excellent { background: rgba(62,207,142,0.15); color: var(--green); }
  .grade-Good      { background: rgba(232,160,32,0.15); color: var(--accent); }
  .grade-Gap       { background: rgba(245,101,101,0.15); color: var(--red); }

  /* Skills chips */
  .skills-section { margin-top: 12px; }
  .skills-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
    margin-bottom: 6px;
    font-weight: 600;
  }
  .chips { display: flex; flex-wrap: wrap; gap: 5px; }
  .chip {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    font-family: var(--font-mono);
  }
  .chip-have { background: rgba(62,207,142,0.12); color: var(--green); border: 1px solid rgba(62,207,142,0.25); }
  .chip-need { background: rgba(245,101,101,0.10); color: var(--red); border: 1px solid rgba(245,101,101,0.2); }

  /* ── Roadmap ── */
  .phases { margin-top: 8px; }
  .phase-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    margin-bottom: 12px;
    position: relative;
  }
  .phase-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .phase-num {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--accent);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .phase-duration {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
    background: var(--border);
    padding: 2px 8px;
    border-radius: 20px;
  }
  .phase-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 10px;
  }
  .phase-tip {
    font-size: 12px;
    color: var(--muted);
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    line-height: 1.5;
  }

  /* ── Comparison ── */
  .compare-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 20px;
  }
  .compare-col {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px;
  }
  .compare-col.winner-col { border-color: var(--accent); }
  .compare-name {
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .winner-badge {
    font-size: 10px;
    background: var(--accent);
    color: #0c0e14;
    padding: 2px 8px;
    border-radius: 20px;
    font-family: var(--font-mono);
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .compare-pct {
    font-family: var(--font-mono);
    font-size: 28px;
    font-weight: 500;
    color: var(--accent);
    margin-bottom: 12px;
  }
  .verdict-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
    margin-top: 4px;
  }
  .verdict-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 8px;
    font-family: var(--font-mono);
  }

  /* ── Loading & Error ── */
  .loading {
    text-align: center;
    padding: 40px;
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 13px;
  }
  .spinner {
    width: 28px; height: 28px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-box {
    background: rgba(245,101,101,0.08);
    border: 1px solid rgba(245,101,101,0.25);
    color: var(--red);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 13px;
    margin-top: 16px;
  }
  .section-title {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
    font-weight: 600;
    margin-bottom: 14px;
    font-family: var(--font-mono);
  }

  /* ── Roadmap overview ── */
  .overview-box {
    background: rgba(232,160,32,0.07);
    border: 1px solid rgba(232,160,32,0.2);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 13px;
    color: var(--accent2);
    margin-bottom: 20px;
    line-height: 1.6;
  }

  @media (max-width: 600px) {
    .compare-grid { grid-template-columns: 1fr; }
    .tabs { flex-direction: column; }
    header { padding: 14px 18px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">DRONA</div>
  <div class="logo-sub">Career Advisor System</div>
</header>

<main>
  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('recommend')">🎯 Recommend</button>
    <button class="tab-btn" onclick="switchTab('roadmap')">🗺 Roadmap</button>
    <button class="tab-btn" onclick="switchTab('compare')">⚖️ Compare</button>
  </div>

  <!-- ── RECOMMEND PANEL ── -->
  <div id="panel-recommend" class="panel active">
    <div class="card">
      <div class="card-title">Career Recommendation</div>

      <div class="form-row">
        <label>Your Skills</label>
        <div class="tag-input-wrap" id="skills-wrap" onclick="focusInput('skills-input')">
          <input class="tag-input" id="skills-input" placeholder="Type a skill & press Enter…"
                 onkeydown="handleTagInput(event,'skills-wrap','skills-input','skills-tags')"/>
        </div>
        <div class="form-hint">e.g. python, sql, javascript, machine learning</div>
      </div>

      <div class="form-row">
        <label>Interests <span style="font-weight:300;text-transform:none;letter-spacing:0">(optional)</span></label>
        <div class="tag-input-wrap" id="interests-wrap" onclick="focusInput('interests-input')">
          <input class="tag-input" id="interests-input" placeholder="Type an interest & press Enter…"
                 onkeydown="handleTagInput(event,'interests-wrap','interests-input','interests-tags')"/>
        </div>
        <div class="form-hint">e.g. web, data, security, mobile</div>
      </div>

      <div style="display:flex;gap:10px;align-items:center;margin-top:6px">
        <button class="btn" onclick="recommend()">Analyse →</button>
        <button class="btn btn-ghost" onclick="clearPanel('recommend')">Clear</button>
      </div>
    </div>

    <div id="recommend-results" class="results"></div>
  </div>

  <!-- ── ROADMAP PANEL ── -->
  <div id="panel-roadmap" class="panel">
    <div class="card">
      <div class="card-title">Career Roadmap</div>

      <div class="form-row">
        <label>Select Career</label>
        <select id="roadmap-career"><option value="">Loading careers…</option></select>
      </div>

      <div class="form-row">
        <label>Your Current Skills <span style="font-weight:300;text-transform:none;letter-spacing:0">(optional — marks what you know)</span></label>
        <div class="tag-input-wrap" id="roadmap-skills-wrap" onclick="focusInput('roadmap-skills-input')">
          <input class="tag-input" id="roadmap-skills-input" placeholder="Type a skill & press Enter…"
                 onkeydown="handleTagInput(event,'roadmap-skills-wrap','roadmap-skills-input','roadmap-skills-tags')"/>
        </div>
      </div>

      <div style="display:flex;gap:10px;margin-top:6px">
        <button class="btn" onclick="getRoadmap()">Build Roadmap →</button>
        <button class="btn btn-ghost" onclick="clearPanel('roadmap')">Clear</button>
      </div>
    </div>

    <div id="roadmap-results" class="results"></div>
  </div>

  <!-- ── COMPARE PANEL ── -->
  <div id="panel-compare" class="panel">
    <div class="card">
      <div class="card-title">Compare Two Careers</div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px" class="compare-selects">
        <div class="form-row" style="margin:0">
          <label>First Career</label>
          <select id="compare-a"><option value="">Select…</option></select>
        </div>
        <div class="form-row" style="margin:0">
          <label>Second Career</label>
          <select id="compare-b"><option value="">Select…</option></select>
        </div>
      </div>

      <div class="form-row" style="margin-top:16px">
        <label>Your Skills <span style="font-weight:300;text-transform:none;letter-spacing:0">(to show match %)</span></label>
        <div class="tag-input-wrap" id="compare-skills-wrap" onclick="focusInput('compare-skills-input')">
          <input class="tag-input" id="compare-skills-input" placeholder="Type a skill & press Enter…"
                 onkeydown="handleTagInput(event,'compare-skills-wrap','compare-skills-input','compare-skills-tags')"/>
        </div>
      </div>

      <div style="display:flex;gap:10px;margin-top:6px">
        <button class="btn" onclick="compareCareer()">Compare →</button>
        <button class="btn btn-ghost" onclick="clearPanel('compare')">Clear</button>
      </div>
    </div>

    <div id="compare-results" class="results"></div>
  </div>
</main>

<script>
// ── Tag storage ──────────────────────────────────────────────────────────────
const tagStores = {};
function getTags(id) { return tagStores[id] || (tagStores[id] = []); }

function handleTagInput(e, wrapId, inputId, storeId) {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    const input = document.getElementById(inputId);
    const val   = input.value.trim().replace(/,/g, '').toLowerCase();
    if (!val) return;
    const tags = getTags(storeId);
    if (!tags.includes(val)) {
      tags.push(val);
      renderTag(wrapId, inputId, storeId, val);
    }
    input.value = '';
  } else if (e.key === 'Backspace') {
    const input = document.getElementById(inputId);
    if (input.value === '') {
      const tags = getTags(storeId);
      if (tags.length) {
        const removed = tags.pop();
        const wrap    = document.getElementById(wrapId);
        const tagEls  = wrap.querySelectorAll('.tag');
        if (tagEls.length) tagEls[tagEls.length - 1].remove();
      }
    }
  }
}

function renderTag(wrapId, inputId, storeId, val) {
  const wrap  = document.getElementById(wrapId);
  const input = document.getElementById(inputId);
  const tag   = document.createElement('div');
  tag.className = 'tag';
  tag.innerHTML = `${val}<span class="tag-remove" onclick="removeTag('${wrapId}','${storeId}','${val}',this)">×</span>`;
  wrap.insertBefore(tag, input);
}

function removeTag(wrapId, storeId, val, el) {
  const tags = getTags(storeId);
  const idx  = tags.indexOf(val);
  if (idx > -1) tags.splice(idx, 1);
  el.parentElement.remove();
}

function focusInput(id) { document.getElementById(id).focus(); }

// ── Tab switching ─────────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  event.target.classList.add('active');
}

// ── Clear ─────────────────────────────────────────────────────────────────────
function clearPanel(name) {
  if (name === 'recommend') {
    clearTagWrap('skills-wrap','skills-input','skills-tags');
    clearTagWrap('interests-wrap','interests-input','interests-tags');
    document.getElementById('recommend-results').innerHTML = '';
  } else if (name === 'roadmap') {
    clearTagWrap('roadmap-skills-wrap','roadmap-skills-input','roadmap-skills-tags');
    document.getElementById('roadmap-career').selectedIndex = 0;
    document.getElementById('roadmap-results').innerHTML = '';
  } else if (name === 'compare') {
    clearTagWrap('compare-skills-wrap','compare-skills-input','compare-skills-tags');
    document.getElementById('compare-a').selectedIndex = 0;
    document.getElementById('compare-b').selectedIndex = 0;
    document.getElementById('compare-results').innerHTML = '';
  }
}
function clearTagWrap(wrapId, inputId, storeId) {
  const wrap  = document.getElementById(wrapId);
  wrap.querySelectorAll('.tag').forEach(t => t.remove());
  const tags = getTags(storeId);
  tags.length = 0;
}

// ── Loading careers into selects ─────────────────────────────────────────────
async function loadCareers() {
  try {
    const res  = await fetch('/careers');
    const list = await res.json();
    ['roadmap-career','compare-a','compare-b'].forEach(id => {
      const sel = document.getElementById(id);
      sel.innerHTML = '<option value="">Select a career…</option>';
      list.forEach(name => {
        const opt = document.createElement('option');
        opt.value = name; opt.textContent = name;
        sel.appendChild(opt);
      });
    });
  } catch(e) { console.error('Failed to load careers', e); }
}
loadCareers();

// ── Helpers ───────────────────────────────────────────────────────────────────
function showLoading(id) {
  document.getElementById(id).innerHTML = `
    <div class="loading"><div class="spinner"></div>Analysing…</div>`;
}
function showError(id, msg) {
  document.getElementById(id).innerHTML =
    `<div class="error-box">⚠ ${msg}</div>`;
}

function progressBar(pct) {
  const clr = pct >= 80 ? '#3ecf8e' : pct >= 50 ? '#e8a020' : '#f56565';
  return `
    <div class="progress-wrap">
      <div class="progress-label">
        <span>Match Score</span>
        <span>${pct}%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" style="width:${pct}%;background:linear-gradient(90deg,${clr},${clr}dd)"></div>
      </div>
    </div>`;
}

function chipsHTML(skills, type) {
  return skills.map(s =>
    `<span class="chip chip-${type}">${s}</span>`).join('');
}

// ── RECOMMEND ─────────────────────────────────────────────────────────────────
async function recommend() {
  const skills    = getTags('skills-tags');
  const interests = getTags('interests-tags');
  if (!skills.length) { alert('Enter at least one skill!'); return; }

  showLoading('recommend-results');
  try {
    const res  = await fetch('/recommend', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ skills, interests })
    });
    const data = await res.json();
    if (data.error) { showError('recommend-results', data.error); return; }
    renderRecommend(data);
  } catch(e) { showError('recommend-results', 'Server error. Is Flask running?'); }
}

function renderRecommend(results) {
  if (!results.length) { showError('recommend-results','No matches found'); return; }
  let html = `<div class="section-title">Top Matches for Your Profile</div>`;
  results.forEach(r => {
    const pct = r.matchPercent;
    html += `
      <div class="result-card rank-${r.rank}">
        <div class="result-header">
          <div>
            <div class="result-name">${r.careerName}</div>
            <div class="result-category">${r.category}</div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
            <span class="result-rank">#${r.rank}</span>
            <span class="grade grade-${r.grade}">${r.grade}</span>
            ${r.boosted ? '<span class="grade" style="background:rgba(62,207,142,0.12);color:#3ecf8e">Interest Match ↑</span>' : ''}
          </div>
        </div>
        ${r.description ? `<div class="result-desc">${r.description}</div>` : ''}
        ${progressBar(pct)}
        ${r.matchedSkills.length ? `
          <div class="skills-section">
            <div class="skills-label">✓ Skills you have (${r.matchedSkills.length})</div>
            <div class="chips">${chipsHTML(r.matchedSkills,'have')}</div>
          </div>` : ''}
        ${r.missingSkills.length ? `
          <div class="skills-section" style="margin-top:10px">
            <div class="skills-label">✗ Skills to learn (${r.missingSkills.length})</div>
            <div class="chips">${chipsHTML(r.missingSkills,'need')}</div>
          </div>` : ''}
      </div>`;
  });
  document.getElementById('recommend-results').innerHTML = html;
  // Animate bars
  setTimeout(() => document.querySelectorAll('.progress-fill').forEach(b => {
    const w = b.style.width; b.style.width = '0%';
    requestAnimationFrame(() => { b.style.width = w; });
  }), 50);
}

// ── ROADMAP ───────────────────────────────────────────────────────────────────
async function getRoadmap() {
  const career = document.getElementById('roadmap-career').value;
  if (!career) { alert('Select a career first!'); return; }
  const skills = getTags('roadmap-skills-tags');

  showLoading('roadmap-results');
  try {
    const res  = await fetch('/roadmap', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ career, skills })
    });
    const data = await res.json();
    if (data.error) { showError('roadmap-results', data.error); return; }
    renderRoadmap(data);
  } catch(e) { showError('roadmap-results', 'Server error. Is Flask running?'); }
}

function renderRoadmap(rdm) {
  const totalSkills = rdm.phases.reduce((a,p) => a + p.skills.length, 0);
  const knownSkills = rdm.phases.reduce((a,p) => a + p.skills.filter(s=>s.known).length, 0);
  let html = `
    <div class="section-title">Learning Roadmap — ${rdm.careerName}</div>
    <div class="overview-box">
      ${rdm.overview}
      ${knownSkills > 0 ? ` <strong style="color:var(--green)">${knownSkills}/${totalSkills} skills already known.</strong>` : ''}
    </div>
    <div class="phases">`;
  rdm.phases.forEach(ph => {
    const known   = ph.skills.filter(s => s.known).length;
    const total   = ph.skills.length;
    const phasePct = Math.round((known / total) * 100);
    html += `
      <div class="phase-card">
        <div class="phase-header">
          <span class="phase-num">Phase ${ph.number}</span>
          <span class="phase-duration">${ph.duration}</span>
        </div>
        <div class="phase-title">${ph.title}</div>
        ${known > 0 ? `
          <div style="margin-bottom:10px">
            <div class="progress-label" style="font-size:11px;margin-bottom:4px">
              <span style="color:var(--muted)">Progress</span>
              <span style="font-family:var(--font-mono);color:var(--green)">${known}/${total} known</span>
            </div>
            <div class="progress-bar" style="height:4px">
              <div class="progress-fill" style="width:${phasePct}%;background:var(--green)"></div>
            </div>
          </div>` : ''}
        <div class="chips">
          ${ph.skills.map(s => s.known
            ? `<span class="chip chip-have">✓ ${s.name}</span>`
            : `<span class="chip chip-need">${s.name}</span>`
          ).join('')}
        </div>
        <div class="phase-tip">💡 ${ph.tip}</div>
      </div>`;
  });
  html += '</div>';
  document.getElementById('roadmap-results').innerHTML = html;
}

// ── COMPARE ───────────────────────────────────────────────────────────────────
async function compareCareer() {
  const ca     = document.getElementById('compare-a').value;
  const cb     = document.getElementById('compare-b').value;
  const skills = getTags('compare-skills-tags');
  if (!ca || !cb) { alert('Select both careers!'); return; }
  if (ca === cb)  { alert('Select two different careers!'); return; }

  showLoading('compare-results');
  try {
    const res  = await fetch('/compare', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ careerA: ca, careerB: cb, skills })
    });
    const data = await res.json();
    if (data.error) { showError('compare-results', data.error); return; }
    renderCompare(data);
  } catch(e) { showError('compare-results', 'Server error. Is Flask running?'); }
}

function renderCompare(cmp) {
  const aIsWinner = cmp.winner === cmp.nameA;
  let html = `
    <div class="section-title">Career Comparison</div>
    <div class="compare-grid">
      <div class="compare-col ${aIsWinner ? 'winner-col' : ''}">
        <div class="compare-name">
          ${cmp.nameA}
          ${aIsWinner ? '<span class="winner-badge">WINNER</span>' : ''}
        </div>
        <div class="compare-pct">${cmp.pctA}%</div>
        ${cmp.descA ? `<div class="result-desc" style="font-size:12px">${cmp.descA}</div>` : ''}
        ${progressBar(cmp.pctA)}
        ${cmp.matchedA.length ? `
          <div class="skills-section">
            <div class="skills-label">Have</div>
            <div class="chips">${chipsHTML(cmp.matchedA,'have')}</div>
          </div>` : ''}
        ${cmp.missingA.length ? `
          <div class="skills-section" style="margin-top:8px">
            <div class="skills-label">Need (${cmp.missingA.length})</div>
            <div class="chips">${chipsHTML(cmp.missingA,'need')}</div>
          </div>` : ''}
      </div>

      <div class="compare-col ${!aIsWinner ? 'winner-col' : ''}">
        <div class="compare-name">
          ${cmp.nameB}
          ${!aIsWinner ? '<span class="winner-badge">WINNER</span>' : ''}
        </div>
        <div class="compare-pct">${cmp.pctB}%</div>
        ${cmp.descB ? `<div class="result-desc" style="font-size:12px">${cmp.descB}</div>` : ''}
        ${progressBar(cmp.pctB)}
        ${cmp.matchedB.length ? `
          <div class="skills-section">
            <div class="skills-label">Have</div>
            <div class="chips">${chipsHTML(cmp.matchedB,'have')}</div>
          </div>` : ''}
        ${cmp.missingB.length ? `
          <div class="skills-section" style="margin-top:8px">
            <div class="skills-label">Need (${cmp.missingB.length})</div>
            <div class="chips">${chipsHTML(cmp.missingB,'need')}</div>
          </div>` : ''}
      </div>
    </div>

    <div class="verdict-box">
      <div class="verdict-label">Verdict</div>
      ${cmp.verdict}
    </div>`;
  document.getElementById('compare-results').innerHTML = html;
}
</script>
